        lwjgl3ifyAsm("org.ow2.asm:asm-util:${lwjgl3ifyAsmVersion}")
        lwjgl3ifyAsm("org.ow2.asm:asm-analysis:${lwjgl3ifyAsmVersion}")
    }

    def lwjgl3ifyDevJarProvider = project.provider {
        ((Configuration) project.property("java17DependenciesCfg")).files.find {
            it.name.startsWith("lwjgl3ify-") && it.name.endsWith("-dev.jar")
        }
    }
    def lwjgl3ifyForgePatchesJarProvider = project.provider {
        ((Configuration) project.property("java17PatchDependenciesCfg")).files.find {
            it.name.startsWith("lwjgl3ify-") && it.name.contains("forgePatches") && it.name.endsWith(".jar")
        }
    }

    def repackLwjgl3ifyJar = { String taskName, Provider<File> inputJarProvider, String outputArchiveFileName ->
        tasks.register(taskName, Jar) {
            destinationDirectory.set(layout.buildDirectory.dir("tmp/lwjgl3ify"))
            archiveFileName.set(outputArchiveFileName)
            duplicatesStrategy = DuplicatesStrategy.EXCLUDE
            doFirst {
                final File inputJar = inputJarProvider.get()
                if (!inputJar.exists()) {
                    throw new GradleException("Missing lwjgl3ify input jar for task ${taskName}")
                }
                final JarFile jarFile = new JarFile(inputJar)
                try {
                    final inputManifest = jarFile.getManifest()
                    if (inputManifest != null) {
                        inputManifest.mainAttributes.each { key, value ->
                            manifest.attributes((key.toString()): value.toString())
                        }
                    }
                } finally {
                    jarFile.close()
                }
            }
            from(project.provider { zipTree(inputJarProvider.get()) }) {
                exclude "org/objectweb/asm/**"
            }
            from(project.provider {
                ((Configuration) project.property("lwjgl3ifyAsmCfg")).files.collect { zipTree(it) }
            }) {
                include "org/objectweb/asm/**"
            }
        }
    }


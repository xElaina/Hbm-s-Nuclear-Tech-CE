            delete(glStateManagerBackupFile)
        }
        if (fmlTweakerBackupFile.exists()) {
            copy { from fmlTweakerBackupFile; into fmlTweakerSource.parent; rename { 'FMLTweaker.java' } }
            delete(fmlTweakerBackupFile)
        }
    }
}

tasks.register('repatchSourcesForIDE') {
    group = 'ide'

    outputs.files(glStateManagerSource, fmlTweakerSource)

    doLast {
        patchGlStateManagerSource(glStateManagerSource)
        patchFmlTweakerSource(fmlTweakerSource)
    }
}

tasks.named('patchAndBackupSources').configure {it.dependsOn(tasks.named('decompressDecompiledSources'))}
tasks.named('compilePatchedMcJava').configure {it.dependsOn(tasks.named('patchAndBackupSources'))}
tasks.named('restoreOriginalSources').configure {it.dependsOn(tasks.named('classes'))}
tasks.named('reobfJar').configure {it.dependsOn(tasks.named('restoreOriginalSources'))}
tasks.named('build').configure {it.finalizedBy(tasks.named('repatchSourcesForIDE'))}
// End GlStateManager hack

// JVMDG configuration
jvmdg {
    ignoreWarningsIn = ["com/hbm/lib/internal/TrustedLookupAccessor"] as Set
    shadeInlining = false
}
// End JVMDG configuration

tasks.withType(Test).configureEach {
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

// GlStateManager hack
def sourceBackupDir = file("build/tmp/sourceBackup")
def glStateManagerSource = file("build/rfg/minecraft-src/java/net/minecraft/client/renderer/GlStateManager.java")
def fmlTweakerSource = file("build/rfg/minecraft-src/java/net/minecraftforge/fml/common/launcher/FMLTweaker.java")

def patchGlStateManagerSource = { File targetFile ->
    String originalContent = targetFile.getText('UTF-8')
    if (!originalContent.contains("public static void rotate(double")) {
        def methodToInject = """

    @SuppressWarnings("all")
    public static void rotate(double angle, float x, float y, float z) {
        // This is a compile-time-only stub. The real implementation is injected by coremod at runtime.
    }

"""
        int lastBraceIndex = originalContent.lastIndexOf('}')
        String newContent = originalContent.substring(0, lastBraceIndex) + methodToInject + originalContent.substring(lastBraceIndex)
        targetFile.setText(newContent, 'UTF-8')
    }
}

def patchFmlTweakerSource = { File targetFile ->
    String originalContent = targetFile.getText('UTF-8')
    final String sentinel = 'Skipping FML security manager installation because this Java runtime no longer supports it'
    if (originalContent.contains(sentinel)) {
        return
    }

    final boolean usesCrlf = originalContent.contains('\r\n')
    String normalizedContent = originalContent.replace('\r\n', '\n')
    final String oldSnippet = """        try
        {
            System.setSecurityManager(new FMLSecurityManager());
        }
        catch (SecurityException se)
        {
            throw new RuntimeException("FML was unable to install the security manager. The game will not start", se);
        }"""
    final String newSnippet = """        try
        {
            System.setSecurityManager(new FMLSecurityManager());
        }
        catch (UnsupportedOperationException ignored)
        {
            LogManager.getLogger("FML.TWEAK").warn("${sentinel}");
        }
        catch (SecurityException se)
        {
            throw new RuntimeException("FML was unable to install the security manager. The game will not start", se);
        }"""
    String newContent = normalizedContent.replace(oldSnippet, newSnippet)
    if (newContent == normalizedContent) {
        throw new GradleException("Failed to patch FMLTweaker.java for Java 25 security-manager compatibility")
    }
    if (usesCrlf) {
        newContent = newContent.replace('\n', '\r\n')
    }
    targetFile.setText(newContent, 'UTF-8')
}

